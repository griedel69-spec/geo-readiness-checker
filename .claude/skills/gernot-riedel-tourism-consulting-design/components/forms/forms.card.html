<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<div id="root" style="padding:20px;background:var(--surface-page);font-family:var(--font-body)"></div>
<script type="text/babel">
const {Button,IconButton,Input,Select,Checkbox,Radio,Switch}=window.GernotRiedelTourismConsultingDesignSystem_02866a;
function Demo(){
  const [checked,setChecked]=React.useState(true);
  return <div style={{display:'flex',flexDirection:'column',gap:20}}>
    <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
      <Button variant="primary">Angebot senden</Button>
      <Button variant="accent">Jetzt starten</Button>
      <Button variant="secondary">Abbrechen</Button>
      <Button variant="ghost">Mehr erfahren</Button>
      <Button variant="primary" size="sm">Klein</Button>
      <Button variant="primary" disabled>Deaktiviert</Button>
      <IconButton label="Löschen">✕</IconButton>
    </div>
    <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
      <Input label="E-Mail" placeholder="name@firma.at" help="Wird nicht veröffentlicht"/>
      <Input label="Firma" placeholder="TVB Kitzbühel" error="Pflichtfeld"/>
      <Select label="Region" options={['Kitzbüheler Alpen','Wörthersee','Gasteinertal']}/>
    </div>
    <div style={{display:'flex',gap:20,alignItems:'center',flexWrap:'wrap'}}>
      <Checkbox label="AGB gelesen" checked={checked} onChange={e=>setChecked(e.target.checked)}/>
      <Radio name="r" label="Quick Insight" checked/>
      <Radio name="r" label="Professional"/>
      <Switch checked={checked} onChange={e=>setChecked(e.target.checked)} label="Toggle"/>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
