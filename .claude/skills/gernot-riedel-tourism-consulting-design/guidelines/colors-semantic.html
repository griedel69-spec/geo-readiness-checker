<!-- @dsCard group="Colors" viewport="700x200" name="Semantic Tokens" subtitle="Surface, text, border, brand aliases in use" -->
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);font-size:13px;background:var(--surface-page)}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border-default)}.cell{background:var(--surface-card);padding:12px;display:flex;flex-direction:column;gap:6px}.sw{height:28px;border-radius:4px}</style>
<div class="grid">
<div class="cell"><div class="sw" style="background:var(--surface-page)"></div>--surface-page</div>
<div class="cell"><div class="sw" style="background:var(--surface-card);border:1px solid var(--border-default)"></div>--surface-card</div>
<div class="cell"><div class="sw" style="background:var(--surface-brand)"></div>--surface-brand</div>
<div class="cell"><div class="sw" style="background:var(--text-primary)"></div>--text-primary</div>
<div class="cell"><div class="sw" style="background:var(--text-secondary)"></div>--text-secondary</div>
<div class="cell"><div class="sw" style="background:var(--brand-primary-hover)"></div>--brand-primary-hover</div>
<div class="cell"><div class="sw" style="background:var(--accent)"></div>--accent</div>
<div class="cell"><div class="sw" style="background:var(--accent-hover)"></div>--accent-hover</div>
<div class="cell"><div class="sw" style="background:var(--border-strong)"></div>--border-strong</div>
</div>
